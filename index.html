<script>

// ===== Live data source (published Google Sheet CSV) =====
const SHEET_URLS = {
  purchase: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOuhEmzE_CaZCQi_aVC83X3rbcpxODJwFZkHlAc9KrfOO3SQbpPrNEBSwwLQmLhIJ3sxmMmAUePonk/pub?gid=0&single=true&output=csv',
  traffic: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOuhEmzE_CaZCQi_aVC83X3rbcpxODJwFZkHlAc9KrfOO3SQbpPrNEBSwwLQmLhIJ3sxmMmAUePonk/pub?gid=654212895&single=true&output=csv'
};
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5 minutes

// ===== CSV parsing (handles quoted fields with embedded commas, e.g. "₩3,100 (0.31%)") =====
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0; i<text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function parseNum(s){
  if(s == null) return 0;
  s = String(s).trim();
  if(s === '' || s === '-') return 0;
  const m = s.match(/^[₩]?([\d,]+)/);
  return m ? parseInt(m[1].replace(/,/g, ''), 10) : 0;
}
function parsePct(s){
  if(s == null) return 0;
  const m = String(s).match(/\(([\d.]+)%\)/) || String(s).match(/([\d.]+)%/);
  return m ? parseFloat(m[1]) : 0;
}

function categorize(source){
  const s = (source || '').toLowerCase();
  if(s.includes('direct')) return 'Direct';
  if(s.includes('naver / bsa')) return 'Naver BSA';
  if(s.includes('naver') && s.includes('organic')) return 'Naver 자연검색';
  if(s.includes('naver')) return 'Naver 기타(카페/블로그 등)';
  if(s.includes('google') && s.includes('organic')) return 'Google 자연검색';
  if(s.includes('google')) return 'Google 기타';
  if(s.includes('members.neungyule')) return '능률 통합회원';
  if(s.includes('netutor.co.kr')) return 'NE튜터';
  if(s.includes('nebooks')) return 'NE북스';
  if(s.includes('lms.nelab')) return '주니어랩(B2B)';
  if(s.includes('kakao')) return '카카오';
  if(s.includes('instagram')) return '인스타그램';
  if(s.includes('chatgpt') || s.includes('gemini') || s.includes('ai-assistant') || s.includes('copilot')) return 'AI 검색/어시스턴트';
  if(s.includes('bing')) return 'Bing';
  if(s.includes('yahoo')) return 'Yahoo';
  if(s.includes('daum')) return 'Daum';
  if(s.includes('neungyule.com')) return '능률 기타';
  return '기타';
}

function buildTrafficRows(rows){
  // row[0] is blank leading column in this sheet layout; data starts at row index 2 (0-indexed)
  const out = [];
  for(let i=2; i<rows.length; i++){
    const r = rows[i];
    if(!r || r.length < 13 || !String(r[1]||'').trim()) continue;
    const [ , idx, device, source, sessions, engagedSessions, engageRate, avgTime, evPerSession, eventCount, keyEvent, keyEventRate, revenue ] = r;
    if(!device || !source) continue;
    out.push({
      idx: parseInt(idx,10) || 0,
      device: (device||'').trim(),
      source: (source||'').trim(),
      sessions: parseNum(sessions),
      sessions_pct: parsePct(sessions),
      engaged_sessions: parseNum(engagedSessions),
      engage_rate: (engageRate||'').trim().replace('%',''),
      avg_time: (avgTime||'').trim(),
      events_per_session: (evPerSession||'').trim(),
      event_count: parseNum(eventCount),
      key_event: keyEvent ? parseNum(keyEvent) : 0,
      key_event_rate: (keyEventRate||'').trim().replace('%',''),
      revenue: parseNum(revenue),
      revenue_pct: parsePct(revenue),
      channel: categorize(source)
    });
  }
  return out;
}

function buildPurchaseRows(rows){
  const out = [];
  for(let i=2; i<rows.length; i++){
    const r = rows[i];
    if(!r || r.length < 7 || !String(r[1]||'').trim()) continue;
    const [ , idx, txnId, source, ecommerce, revenue, device ] = r;
    if(!device || !source) continue;
    out.push({
      idx: parseInt(idx,10) || 0,
      txn_id: (txnId||'').trim(),
      source: (source||'').trim(),
      device: (device||'').trim(),
      revenue: parseNum(revenue),
      revenue_pct: parsePct(revenue),
      channel: categorize(source)
    });
  }
  return out;
}

function buildChannelDevice(trafficRows, purchaseRows){
  const sessions = new Map(), txn = new Map(), rev = new Map();
  const keyOf = (ch, dev) => ch + '§' + dev;
  trafficRows.forEach(t=>{
    const k = keyOf(t.channel, t.device);
    sessions.set(k, (sessions.get(k)||0) + t.sessions);
  });
  purchaseRows.forEach(p=>{
    const k = keyOf(p.channel, p.device);
    txn.set(k, (txn.get(k)||0) + 1);
    rev.set(k, (rev.get(k)||0) + p.revenue);
  });
  const allKeys = new Set([...sessions.keys(), ...txn.keys()]);
  const out = [];
  allKeys.forEach(k=>{
    const [channel, device] = k.split('§');
    const s = sessions.get(k) || 0;
    const t = txn.get(k) || 0;
    const r = rev.get(k) || 0;
    out.push({
      channel, device, sessions: s, txn: t, revenue: r,
      conv_rate: s ? +(t/s*100).toFixed(3) : 0,
      rev_per_session: s ? +(r/s).toFixed(1) : 0
    });
  });
  out.sort((a,b)=>b.sessions - a.sessions);
  return out;
}

async function fetchSheet(url){
  const bustUrl = url + (url.includes('?') ? '&' : '?') + '_ts=' + Date.now();
  const res = await fetch(bustUrl, { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  return parseCSV(text);
}

// ===== Formatting helpers =====
const fmtWon = n => '₩' + Math.round(n).toLocaleString('ko-KR');
const fmtNum = n => Math.round(n).toLocaleString('ko-KR');
const fmtPct = (n, d=1) => (typeof n === 'number' ? n.toFixed(d) : n) + '%';

const COLORS = {
  pc: '#3D5AFE',
  mo: '#0EA5A5',
  yellow: '#F5A623',
  coral: '#E5484D',
  ink: '#111827',
  inkSoft: '#6B7280',
  rule: '#E5E7EB'
};

Chart.defaults.font.family = "'Pretendard', sans-serif";
Chart.defaults.color = COLORS.inkSoft;
Chart.defaults.font.size = 12.5;

// ===== Aggregate helpers =====
function sum(arr, fn){ return arr.reduce((a,b)=>a+fn(b), 0); }
function groupBy(arr, keyFn){
  const m = new Map();
  arr.forEach(item=>{
    const k = keyFn(item);
    if(!m.has(k)) m.set(k, []);
    m.get(k).push(item);
  });
  return m;
}

// ===== Reactive data state (populated by fetchAndRenderAll) =====
let traffic = [];
let purchase = [];
let chDev = [];

let totalSessions = 0, totalTrafficRevenue = 0, totalTxn = 0, totalPurchaseRevenue = 0;
let overallConv = 0, revPerSession = 0;
let byDeviceSessions = new Map(), byDevicePurchase = new Map();
let pcStat = {sessions:0, txn:0, revenue:0, aov:0, conv:0};
let moStat = {sessions:0, txn:0, revenue:0, aov:0, conv:0};

function deviceStat(device){
  const tArr = byDeviceSessions.get(device) || [];
  const pArr = byDevicePurchase.get(device) || [];
  const sessions = sum(tArr, t=>t.sessions);
  const txn = pArr.length;
  const revenue = sum(pArr, p=>p.revenue);
  return { sessions, txn, revenue, aov: txn ? revenue/txn : 0, conv: sessions ? txn/sessions*100 : 0 };
}

function computeDerived(){
  totalSessions = sum(traffic, t=>t.sessions);
  totalTrafficRevenue = sum(traffic, t=>t.revenue);
  totalTxn = purchase.length;
  totalPurchaseRevenue = sum(purchase, p=>p.revenue);
  overallConv = totalSessions ? (totalTxn / totalSessions * 100) : 0;
  revPerSession = totalSessions ? totalTrafficRevenue / totalSessions : 0;
  byDeviceSessions = groupBy(traffic, t=>t.device);
  byDevicePurchase = groupBy(purchase, p=>p.device);
  pcStat = deviceStat('PC');
  moStat = deviceStat('MO');
}

// ===== Status UI (loading / last-updated / refresh button) =====
function setStatus(mode, text){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.className = 'sync-status ' + mode;
  el.querySelector('.sync-text').textContent = text;
}

async function loadAllData(isManual){
  setStatus('loading', isManual ? '새로고침 중…' : '데이터 불러오는 중…');
  try{
    const [purchaseRows, trafficRows] = await Promise.all([
      fetchSheet(SHEET_URLS.purchase),
      fetchSheet(SHEET_URLS.traffic)
    ]);
    const newPurchase = buildPurchaseRows(purchaseRows);
    const newTraffic = buildTrafficRows(trafficRows);
    if(newPurchase.length === 0 && newTraffic.length === 0){
      throw new Error('시트에서 데이터를 찾을 수 없습니다');
    }
    purchase = newPurchase;
    traffic = newTraffic;
    chDev = buildChannelDevice(traffic, purchase);
    computeDerived();
    safeRender('p1', renderPanel1);
    safeRender('p2', renderPanel2);
    safeRender('p3', renderPanel3);
    safeRender('p4', renderPanel4);
    safeRender('p5', renderPanel5);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    setStatus('ok', '마지막 업데이트 ' + timeStr + ' · 시트 실시간 연동중');
  } catch(err){
    console.error('Sheet fetch failed:', err);
    setStatus('error', '시트 연동 실패 — 잠시 후 다시 시도합니다 (' + err.message + ')');
  }
}

function topChannelsByDevice(device, n=10){
  const arr = traffic.filter(t=>t.device===device).slice().sort((a,b)=>b.sessions-a.sessions);
  const top = arr.slice(0, n);
  const restSessions = sum(arr.slice(n), t=>t.sessions);
  return { top, restSessions, total: sum(arr, t=>t.sessions) };
}

      labels: qualified.map(r=>`${r.channel} (${r.device})`),
      datasets: [{ data: qualified.map(r=>r.conv_rate), backgroundColor: qualified.map(r=>r.device==='PC'?COLORS.pc:COLORS.mo), borderRadius:4 }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:(c)=>c.parsed.x.toFixed(3)+'%'}}},
      scales:{ x:{grid:{color:COLORS.rule}, title:{display:true,text:'전환율(%)',font:{size:11}}}, y:{grid:{display:false}} }
    }
  });
}

// ===================================================================
// PANEL 5 — Raw 데이터 테이블
// ===================================================================
let rawMode = 'traffic';
let rawDeviceFilter = 'ALL';
let rawSearch = '';
let rawSortKey = null;
let rawSortDir = -1;

function renderPanel5(){
  const el = document.getElementById('p5');
  el.innerHTML = `
    <section class="block">
      <div class="block-head"><span class="block-num">§1</span><h2 class="block-title">Raw 데이터 <span class="hl yellow">탐색</span></h2></div>
      <div class="filter-bar">
        <div class="seg" id="modeSeg">
          <button data-mode="traffic" class="active">유입 raw (${traffic.length})</button>
          <button data-mode="purchase">구매 raw (${purchase.length})</button>
        </div>
        <div class="seg" id="deviceSeg">
          <button data-device="ALL" class="active">전체</button>
          <button data-device="PC">PC</button>
          <button data-device="MO">MO</button>
        </div>
        <input type="text" id="rawSearch" placeholder="소스/매체 검색…">
      </div>
      <div class="table-scroll"><table class="data-table" id="rawTable"></table></div>
      <div class="row-count" id="rawCount"></div>
    </section>
  `;

  document.querySelectorAll('#modeSeg button').forEach(b=>b.addEventListener('click', ()=>{
    rawMode = b.getAttribute('data-mode'); rawSortKey=null;
    document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderRawTable();
  }));
  document.querySelectorAll('#deviceSeg button').forEach(b=>b.addEventListener('click', ()=>{
    rawDeviceFilter = b.getAttribute('data-device');
    document.querySelectorAll('#deviceSeg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderRawTable();
  }));
  document.getElementById('rawSearch').addEventListener('input', (e)=>{
    rawSearch = e.target.value.toLowerCase();
    renderRawTable();
  });

  renderRawTable();
}

function renderRawTable(){
  const table = document.getElementById('rawTable');
  const countEl = document.getElementById('rawCount');

  let cols, data;
  if(rawMode === 'traffic'){
    cols = [
      {key:'device', label:'기기'}, {key:'source', label:'소스/매체'},
      {key:'sessions', label:'세션', num:true}, {key:'sessions_pct', label:'세션비중', num:true, fmt:v=>v.toFixed(2)+'%'},
      {key:'engage_rate', label:'참여율', num:true, fmt:v=>v+'%'}, {key:'avg_time', label:'평균참여시간'},
      {key:'event_count', label:'이벤트수', num:true}, {key:'revenue', label:'수익', num:true, fmt:fmtWon}
    ];
    data = traffic;
  } else {
    cols = [
      {key:'device', label:'기기'}, {key:'txn_id', label:'거래ID'}, {key:'source', label:'첫 유입 소스/매체'},
      {key:'revenue', label:'구매수익', num:true, fmt:fmtWon}, {key:'revenue_pct', label:'수익비중', num:true, fmt:v=>v.toFixed(2)+'%'}
    ];
    data = purchase;
  }

  let filtered = data.filter(d => (rawDeviceFilter==='ALL' || d.device===rawDeviceFilter) && (rawSearch==='' || d.source.toLowerCase().includes(rawSearch)));

  if(rawSortKey){
    filtered = filtered.slice().sort((a,b)=>{
      const av=a[rawSortKey], bv=b[rawSortKey];
      if(typeof av === 'number') return (av-bv)*rawSortDir;
      return String(av).localeCompare(String(bv)) * rawSortDir;
    });
  }

  const thead = `<thead><tr>${cols.map(c=>`<th class="${c.num?'num':''}" data-key="${c.key}">${c.label}${rawSortKey===c.key?(rawSortDir===1?' ▴':' ▾'):''}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${filtered.map(row=>`<tr>${cols.map(c=>{
    let v = row[c.key];
    if(c.key==='device'){ return `<td><span class="badge ${v.toLowerCase()}">${v}</span></td>`; }
    if(c.fmt) v = c.fmt(v);
    else if(typeof v === 'number') v = fmtNum(v);
    return `<td class="${c.num?'num':''}">${v}</td>`;
  }).join('')}</tr>`).join('')}</tbody>`;

  table.innerHTML = thead + tbody;
  countEl.textContent = `${filtered.length}개 행 표시 중 (전체 ${data.length}개)`;

  table.querySelectorAll('th[data-key]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.getAttribute('data-key');
      if(rawSortKey === key){ rawSortDir *= -1; } else { rawSortKey = key; rawSortDir = -1; }
      renderRawTable();
    });
  });
}

// ===================================================================
// Tab navigation — wire this up FIRST so tab switching always works
// even if a chart render below throws.
// ===================================================================
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.getAttribute('data-panel')).classList.add('active');
  });
});

// ===================================================================
// Init — each panel wrapped in try/catch so one failure doesn't blank
// out the rest of the dashboard.
// ===================================================================
function safeRender(name, fn){
  try { fn(); }
  catch(e){
    console.error('Render failed:', name, e);
    const el = document.getElementById(name);
    if (el) el.innerHTML = '<p style="color:#E5484D; font-family:monospace; font-size:13px; padding:20px;">이 탭을 불러오는 중 오류가 발생했습니다: ' + (e && e.message ? e.message : e) + '</p>';
  }
}

// Kick off live data load, then poll on an interval.
loadAllData(false);
setInterval(() => loadAllData(false), AUTO_REFRESH_MS);

// Manual refresh button
document.addEventListener('click', (e)=>{
  if(e.target && e.target.id === 'refreshBtn'){
    loadAllData(true);
  }
});

</script>
