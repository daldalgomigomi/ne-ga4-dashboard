<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA4 마케팅 성과 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F5F6F8;
  --surface:#FFFFFF;
  --border:#E5E7EB;
  --border-strong:#D1D5DB;
  --ink:#111827;
  --ink-soft:#6B7280;
  --ink-faint:#9CA3AF;
  --accent:#3D5AFE;
  --accent-soft:#EEF1FF;
  --pc:#3D5AFE;
  --mo:#0EA5A5;
  --mo-soft:#E6F7F5;
  --warn:#F5A623;
  --danger:#E5484D;
  --danger-soft:#FDECEC;
  --sidebar-bg:#111827;
  --sidebar-text:#9CA3AF;
  --sidebar-text-active:#FFFFFF;
  --shadow-sm: 0 1px 2px rgba(17,24,39,0.04);
  --shadow-md: 0 4px 12px -4px rgba(17,24,39,0.08), 0 1px 3px rgba(17,24,39,0.04);
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Pretendard', -apple-system, sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono', monospace;}

/* ---------- Signature accent: colored key-metric tick ---------- */
.tick{
  display:inline-block;
  width:6px; height:6px;
  border-radius:50%;
  margin-right:8px;
  background:var(--accent);
  vertical-align:middle;
}

/* ---------- Shell: sidebar + content ---------- */
.shell{display:flex; min-height:100vh;}
.sidebar{
  width:236px;
  background:var(--sidebar-bg);
  color:var(--sidebar-text);
  flex-shrink:0;
  padding:26px 18px;
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  flex-direction:column;
}
.brand{padding:2px 8px 22px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:18px;}
.brand-eyebrow{font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.1em; color:#6B7280; text-transform:uppercase; margin:0 0 6px;}
.brand-title{font-size:16.5px; font-weight:700; color:#fff; margin:0; line-height:1.4;}
.brand-sub{font-size:12px; color:#6B7280; margin:6px 0 0;}

nav.sidenav{display:flex; flex-direction:column; gap:2px;}
.tab-btn{
  display:flex; align-items:center; gap:10px;
  font-family:'Pretendard'; font-weight:500; font-size:14px;
  padding:10px 12px;
  background:transparent; border:none; border-radius:8px;
  cursor:pointer; color:var(--sidebar-text);
  text-align:left; width:100%;
  transition:background .15s ease, color .15s ease;
}
.tab-btn:hover{background:rgba(255,255,255,0.06); color:#fff;}
.tab-btn.active{background:var(--accent); color:#fff;}
.tab-btn .num{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px;
  width:20px; height:20px; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.08); color:inherit; flex-shrink:0;
}
.tab-btn.active .num{background:rgba(255,255,255,0.25);}

.sidebar-foot{margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); font-size:11px; font-family:'IBM Plex Mono',monospace; color:#4B5563; line-height:1.6;}

.content{flex:1; min-width:0; padding:32px 36px 60px;}
.page-head{margin-bottom:24px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px;}
h1.page-title{font-size:22px; font-weight:700; margin:0 0 4px; color:var(--ink);}
p.page-sub{font-size:13.5px; color:var(--ink-soft); margin:0; max-width:560px;}
.period-badge{
  font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--ink);
  background:var(--surface); border:1px solid var(--border-strong); border-radius:8px;
  padding:8px 14px; white-space:nowrap; box-shadow:var(--shadow-sm);
}
.sync-status{
  display:flex; align-items:center; gap:8px;
  font-family:'IBM Plex Mono',monospace; font-size:12px;
  background:var(--surface); border:1px solid var(--border-strong); border-radius:8px;
  padding:8px 12px; white-space:nowrap; box-shadow:var(--shadow-sm);
}
.sync-status .dot{width:7px; height:7px; border-radius:50%; background:var(--ink-faint); flex-shrink:0;}
.sync-status.loading .dot{background:var(--warn); animation:pulse 1s ease-in-out infinite;}
.sync-status.ok .dot{background:var(--mo);}
.sync-status.stale .dot{background:var(--ink-faint);}
.sync-status.error .dot{background:var(--danger);}
.sync-status .sync-text{color:var(--ink-soft);}
.sync-status.error .sync-text{color:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
#refreshBtn{
  font-family:'Pretendard'; font-weight:600; font-size:12px; color:var(--accent);
  background:none; border:none; cursor:pointer; padding:0 0 0 6px; border-left:1px solid var(--border);
  margin-left:2px;
}
#refreshBtn:hover{text-decoration:underline;}

.panel{display:none;}
.panel.active{display:block; animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

section.block{margin-bottom:32px;}
section.block:last-child{margin-bottom:0;}
.situation-box{
  background:var(--ink); color:#fff; border-radius:var(--radius);
  padding:22px 24px; box-shadow:var(--shadow-md);
}
.situation-label{font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; color:#9CA3AF; margin-bottom:8px;}
.situation-lead{font-size:16px; font-weight:600; line-height:1.55; margin:0 0 14px; color:#fff;}
.situation-points{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px;}
.situation-points li{font-size:13.5px; line-height:1.6; color:#D1D5DB; padding-left:16px; position:relative;}
.situation-points li::before{content:'—'; position:absolute; left:0; color:#6B7280;}
.situation-points strong{color:#fff; font-weight:700;}
.data-source-head{
  display:flex; align-items:baseline; gap:10px; margin-bottom:14px; padding-bottom:10px;
  border-bottom:2px solid var(--border);
}
.data-source-tag{
  font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px;
  padding:4px 12px; border-radius:6px; white-space:nowrap;
}
.data-source-head.traffic .data-source-tag{background:var(--accent-soft); color:var(--pc);}
.data-source-head.purchase .data-source-tag{background:var(--mo-soft); color:var(--mo);}
.data-source-desc{font-size:13px; color:var(--ink-soft);}
.block-head{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
h2.block-title{font-size:15.5px; font-weight:700; margin:0; color:var(--ink);}
p.block-note{color:var(--ink-soft); font-size:13px; margin:-6px 0 16px;}

/* KPI cards */
.kpi-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:14px;}
.kpi-card{
  border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 18px 16px; background:var(--surface); box-shadow:var(--shadow-sm);
  position:relative;
}
.kpi-label{font-size:12.5px; color:var(--ink-soft); font-weight:500; margin-bottom:10px; display:flex; align-items:center;}
.kpi-value{font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:25px; color:var(--ink); letter-spacing:-.01em;}
.kpi-sub{font-size:12px; color:var(--ink-faint); margin-top:6px;}
.kpi-card.stamp::after{
  content:attr(data-stamp);
  position:absolute; top:14px; right:14px;
  font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600;
  color:var(--mo); background:var(--mo-soft); border-radius:20px; padding:3px 9px;
}

.grid-2{display:grid; grid-template-columns:1.1fr .9fr; gap:20px;}
.grid-2.even{grid-template-columns:1fr 1fr;}
@media (max-width:900px){
  .grid-2, .grid-2.even{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .shell{flex-direction:column;}
  .sidebar{width:100%; height:auto; position:relative;}
}

.chart-box{border:1px solid var(--border); border-radius:var(--radius); padding:18px 18px 10px; background:var(--surface); box-shadow:var(--shadow-sm);}
.chart-box .chart-title{font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:12px;}
.chart-canvas-wrap{position:relative; height:270px;}
.chart-canvas-wrap.tall{height:340px;}
.chart-canvas-wrap.short{height:200px;}

/* Insight callouts */
.callout{
  border:1px solid var(--border); border-left:3px solid var(--danger);
  background:var(--danger-soft); border-radius:8px; padding:13px 15px;
  font-size:13px; line-height:1.65; color:var(--ink); margin-top:14px;
}
.callout.mint{border-left-color:var(--mo); background:var(--mo-soft);}
.callout.blue{border-left-color:var(--accent); background:var(--accent-soft);}
.callout strong{font-weight:700;}
.callout ul{margin:6px 0 0; padding-left:18px;}
.callout li{margin-bottom:4px;}

/* Action item cards (실행 제안) */
.action-card{
  border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; margin-bottom:14px; background:var(--surface); box-shadow:var(--shadow-sm);
  border-left:4px solid var(--border-strong);
}
.action-card:last-child{margin-bottom:0;}
.action-card.urgent{border-left-color:var(--danger);}
.action-card.opportunity{border-left-color:var(--mo);}
.action-card.watch{border-left-color:var(--warn);}
.action-tag{
  display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:700;
  text-transform:uppercase; letter-spacing:.04em; padding:3px 9px; border-radius:20px; margin-bottom:8px;
  background:var(--danger-soft); color:var(--danger);
}
.action-card.opportunity .action-tag{background:var(--mo-soft); color:var(--mo);}
.action-card.watch .action-tag{background:#FFF4E0; color:var(--warn);}
.action-title{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px;}
.action-desc{font-size:13.5px; color:var(--ink-soft); line-height:1.6; margin:0 0 8px;}
.action-todo{font-size:13.5px; color:var(--ink); font-weight:600; margin:0; padding-top:8px; border-top:1px dashed var(--border);}

/* Tables */
table.data-table{width:100%; border-collapse:collapse; font-size:13.5px; background:var(--surface);}
table.data-table th{
  text-align:left; font-family:'IBM Plex Mono',monospace; font-size:11px;
  text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft);
  background:#FAFAFB; border-bottom:1px solid var(--border); padding:10px 12px; white-space:nowrap;
  cursor:pointer; user-select:none; position:sticky; top:0;
}
table.data-table th:hover{color:var(--ink);}
table.data-table th .arrow{font-size:10px; opacity:.5; margin-left:3px;}
table.data-table td{padding:9px 12px; border-bottom:1px solid var(--border); color:var(--ink);}
table.data-table tbody tr:hover{background:#FAFAFB;}
table.data-table td.num, table.data-table th.num{font-family:'IBM Plex Mono', monospace; text-align:right;}
.badge{display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:5px;}
.badge.pc{background:var(--accent-soft); color:var(--pc);}
.badge.mo{background:var(--mo-soft); color:var(--mo);}

.filter-bar{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center;}
.filter-bar input[type=text]{
  font-family:'Pretendard'; font-size:13.5px; padding:9px 12px;
  border:1px solid var(--border-strong); border-radius:8px; min-width:220px; background:var(--surface);
}
.filter-bar input[type=text]:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);}
.seg{display:flex; border:1px solid var(--border-strong); border-radius:8px; overflow:hidden; background:var(--surface);}
.seg button{
  font-family:'Pretendard'; font-weight:500; font-size:13px; padding:8px 14px;
  background:transparent; border:none; cursor:pointer; color:var(--ink-soft); border-right:1px solid var(--border-strong);
}
.seg button:last-child{border-right:none;}
.seg button.active{background:var(--ink); color:#fff;}
.table-scroll{max-height:520px; overflow:auto; border:1px solid var(--border); border-radius:var(--radius);}
.row-count{font-size:12px; color:var(--ink-faint); margin-top:8px;}
.debug-line{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint); margin:8px 0 0;}

@media (max-width:600px){
  .content{padding:20px 16px 40px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

</div>

function looksLikeHtml(text){
  return /^\s*<!doctype html/i.test(text) || /^\s*<html/i.test(text);
}

// ===== CSV parsing (handles quoted fields with embedded commas, e.g. "₩3,100 (0.31%)") =====
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0; i<text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function parseNum(s){
  if(s == null) return 0;
  s = String(s).trim();
  if(s === '' || s === '-') return 0;
  const m = s.match(/^[₩]?([\d,]+)/);
  return m ? parseInt(m[1].replace(/,/g, ''), 10) : 0;
}
function parsePct(s){
  if(s == null) return 0;
  const m = String(s).match(/\(([\d.]+)%\)/) || String(s).match(/([\d.]+)%/);
  return m ? parseFloat(m[1]) : 0;
}

function normalizeDate(v){
  if(v == null) return null;
  const raw = String(v).trim();
  if(!raw) return null;
  // Strip thousand-separator commas, spaces, and any stray non-alphanumeric
  // characters a spreadsheet's number formatting might introduce
  // (e.g. a cell formatted as "#,##0" can export 20260609 as "20,260,609").
  const digitsOnly = raw.replace(/[^0-9]/g, '');
  if(digitsOnly.length === 8){
    const yyyy = digitsOnly.slice(0,4), mm = digitsOnly.slice(4,6), dd = digitsOnly.slice(6,8);
    return { key: yyyy+mm+dd, label: mm+'/'+dd };
  }
  // YYYY-MM-DD / YYYY.MM.DD / YYYY/MM/DD (checked on the original string,
  // since stripping separators would collapse this case incorrectly)
  let m = raw.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})$/);
  if(m){
    const mm = m[2].padStart(2,'0'), dd = m[3].padStart(2,'0');
    return { key: m[1]+mm+dd, label: mm+'/'+dd };
  }
  // Unrecognized format — don't guess, since a wrong key would silently
  // fail to match between the traffic and purchase tables.
  console.warn('날짜 형식을 인식하지 못함:', raw);
  return null;
}

function findHeaderRow(rows, mustContain){
  for(let i=0; i<Math.min(rows.length, 10); i++){
    const r = rows[i] || [];
    const joined = r.join('|');
    if(mustContain.every(k => joined.includes(k))) return i;
  }
  return -1;
}
function normalizeHeaderText(s){
  return String(s||'')
    .replace(/\uFEFF/g, '')       // BOM
    .replace(/[\u200B-\u200D]/g, '') // zero-width chars
    .replace(/\u00A0/g, ' ')      // non-breaking space -> normal space
    .trim();
}
function colIndex(headerRow, name){
  return headerRow.findIndex(h => normalizeHeaderText(h) === name);
}

      events_per_session: String(r[col.evPerSession]||'').trim(),
      event_count: parseNum(r[col.eventCount]),
      key_event: parseNum(r[col.keyEvent]),
      key_event_rate: String(r[col.keyEventRate]||'').trim().replace('%',''),
      revenue: parseNum(r[col.revenue]),
      revenue_pct: parsePct(r[col.revenue]),
      channel: categorize(source)
    });
  }
  return out;
}

let PARSE_DEBUG = { purchaseHeader: null, purchaseDateCol: -1, trafficHeader: null, trafficDateCol: -1 };

function buildPurchaseRows(rows){
  const headerIdx = findHeaderRow(rows, ['거래 ID', '구매 수익']);
  if(headerIdx === -1){
    PARSE_DEBUG.purchaseHeader = 'HEADER ROW NOT FOUND';
    PARSE_DEBUG.purchaseDateCol = -1;
    return [];
  }
  const h = rows[headerIdx];
  const col = {
    date: colIndex(h, '날짜'),
    txnId: colIndex(h, '거래 ID'),
    source: colIndex(h, '첫 사용자 소스/매체'),
    revenue: colIndex(h, '구매 수익'),
    device: colIndex(h, '거래기기')
  };
  PARSE_DEBUG.purchaseHeader = JSON.stringify(h.map(c=>normalizeHeaderText(c)));
  PARSE_DEBUG.purchaseDateCol = col.date;
  const out = [];
  for(let i=headerIdx+1; i<rows.length; i++){
    const r = rows[i];
    if(!r) continue;
    const device = col.device>=0 ? r[col.device] : '';
    const source = col.source>=0 ? r[col.source] : '';
    if(!String(device||'').trim() || !String(source||'').trim()) continue;
    out.push({
      idx: i - headerIdx,
      date: col.date>=0 ? normalizeDate(r[col.date]) : null,
      txn_id: String(r[col.txnId]||'').trim(),
      source: String(source).trim(),
      device: String(device).trim(),
      revenue: parseNum(r[col.revenue]),
      revenue_pct: parsePct(r[col.revenue]),
      channel: categorize(source)
    });
  }
  return out;
}

function buildChannelDevice(trafficRows, purchaseRows){
  const sessions = new Map(), txn = new Map(), rev = new Map();
  const keyOf = (ch, dev) => ch + '§' + dev;
  trafficRows.forEach(t=>{
    const k = keyOf(t.channel, t.device);
    sessions.set(k, (sessions.get(k)||0) + t.sessions);
  });
  purchaseRows.forEach(p=>{
    const k = keyOf(p.channel, p.device);
    txn.set(k, (txn.get(k)||0) + 1);
    rev.set(k, (rev.get(k)||0) + p.revenue);
  });
  const allKeys = new Set([...sessions.keys(), ...txn.keys()]);
  const out = [];
  allKeys.forEach(k=>{
    const [channel, device] = k.split('§');
    const s = sessions.get(k) || 0;
    const t = txn.get(k) || 0;
    const r = rev.get(k) || 0;
    out.push({
      channel, device, sessions: s, txn: t, revenue: r,
      conv_rate: s ? +(t/s*100).toFixed(2) : 0,
      rev_per_session: s ? +(r/s).toFixed(1) : 0
    });
  });
  out.sort((a,b)=>b.sessions - a.sessions);
  return out;
}

async function fetchOnce(url){
  const bustUrl = url + (url.includes('?') ? '&' : '?') + '_ts=' + Date.now();
  const res = await fetch(bustUrl, { cache: 'no-store', redirect: 'follow' });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  if(looksLikeHtml(text)) throw new Error('CSV 대신 HTML 페이지가 반환됨');
  return text;
}

// Tries the direct export URL first; if that fails (network error, HTML
// response, non-OK status), falls back to the "publish to web" CSV URL.
let LAST_FETCH_METHOD = { purchase: '(아직 없음)', traffic: '(아직 없음)' };

async function fetchSheetRaw(urls, label){
  const attempts = [
    { name: 'export', url: urls.primary },
    { name: 'pub', url: urls.fallback }
  ];
  const errors = [];
  for(const attempt of attempts){
    try {
      const text = await fetchOnce(attempt.url);
      if(label) LAST_FETCH_METHOD[label] = attempt.name;
      return text;
    } catch(err){
      console.warn(attempt.name + ' 방식 실패:', err.message);
      errors.push(attempt.name + ': ' + err.message);
    }
  }
  if(label) LAST_FETCH_METHOD[label] = '전부 실패';
  throw new Error('모든 방식 실패 (' + errors.join(' / ') + ')');
}

// ===== Aggregate helpers =====
function sum(arr, fn){ return arr.reduce((a,b)=>a+fn(b), 0); }
function groupBy(arr, keyFn){
  const m = new Map();
  arr.forEach(item=>{
    const k = keyFn(item);
    if(!m.has(k)) m.set(k, []);
    m.get(k).push(item);
  });
  return m;
}

// ===== Reactive data state (populated by fetchAndRenderAll) =====
let traffic = FALLBACK_DATA.traffic;
let purchase = FALLBACK_DATA.purchase;
let chDev = FALLBACK_DATA.channelDevice;

let totalSessions = 0, totalTrafficRevenue = 0, totalTxn = 0, totalPurchaseRevenue = 0;
let overallConv = 0, revPerSession = 0;
let byDeviceSessions = new Map(), byDevicePurchase = new Map();
let pcStat = {sessions:0, txn:0, revenue:0, aov:0, conv:0};
let moStat = {sessions:0, txn:0, revenue:0, aov:0, conv:0};
let dailyStats = [];

function deviceStat(device){
  const tArr = byDeviceSessions.get(device) || [];
  const pArr = byDevicePurchase.get(device) || [];
  const sessions = sum(tArr, t=>t.sessions);
  const txn = pArr.length;
  const revenue = sum(pArr, p=>p.revenue);
  return { sessions, txn, revenue, aov: txn ? revenue/txn : 0, conv: sessions ? txn/sessions*100 : 0 };
}

function computeDerived(){
  totalSessions = sum(traffic, t=>t.sessions);
  totalTrafficRevenue = sum(traffic, t=>t.revenue);
  totalTxn = purchase.length;
  totalPurchaseRevenue = sum(purchase, p=>p.revenue);
  overallConv = totalSessions ? (totalTxn / totalSessions * 100) : 0;
  revPerSession = totalSessions ? totalTrafficRevenue / totalSessions : 0;
  byDeviceSessions = groupBy(traffic, t=>t.device);
  byDevicePurchase = groupBy(purchase, p=>p.device);
  pcStat = deviceStat('PC');
  moStat = deviceStat('MO');
  dailyStats = buildDailyStats();
  updatePeriodDisplay();
}

function updatePeriodDisplay(){
  const badge = document.getElementById('periodBadge');
  const sidebarDate = document.getElementById('dataDateRange');
  if(!badge && !sidebarDate) return;

  if(dailyStats.length === 0){
    const msg = '날짜 데이터 없음';
    if(badge) badge.textContent = msg;
    if(sidebarDate) sidebarDate.textContent = msg;
    return;
  }

  const first = dailyStats[0].label;
  const last = dailyStats[dailyStats.length-1].label;
  const dayCount = dailyStats.length;
  const rangeText = first === last ? first : (first + ' – ' + last);

  if(badge) badge.textContent = rangeText + ' (' + dayCount + '일)';
  if(sidebarDate) sidebarDate.textContent = rangeText;
}

function buildDailyStats(){
  const sessionsByDate = new Map();
  const trafficRevByDate = new Map();
  const txnByDate = new Map();
  const purchaseRevByDate = new Map();

  traffic.forEach(t=>{
    if(!t.date) return;
    const k = t.date.key;
    sessionsByDate.set(k, (sessionsByDate.get(k)||0) + t.sessions);
    trafficRevByDate.set(k, (trafficRevByDate.get(k)||0) + t.revenue);
  });
  purchase.forEach(p=>{
    if(!p.date) return;
    const k = p.date.key;
    txnByDate.set(k, (txnByDate.get(k)||0) + 1);
    purchaseRevByDate.set(k, (purchaseRevByDate.get(k)||0) + p.revenue);
  });

  const allKeys = new Set([...sessionsByDate.keys(), ...txnByDate.keys()]);
  if(allKeys.size === 0) return [];

  const labelOf = (k) => {
    const found = traffic.find(t=>t.date && t.date.key===k) || purchase.find(p=>p.date && p.date.key===k);
    return found ? found.date.label : k;
  };

  const out = [...allKeys].map(k => ({
    key: k,
    label: labelOf(k),
    sessions: sessionsByDate.get(k) || 0,
    txn: txnByDate.get(k) || 0,
    revenue: purchaseRevByDate.get(k) || 0
  }));
  out.sort((a,b)=> a.key.localeCompare(b.key));
  return out;
}

// ===== Status UI (loading / last-updated / refresh button) =====
function setStatus(mode, text){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.className = 'sync-status ' + mode;
  el.querySelector('.sync-text').textContent = text;
}

async function loadAllData(isManual){
  setStatus('loading', isManual ? '새로고침 중…' : '최신 데이터 확인 중…');
  try{
    const [purchaseRaw, trafficRaw] = await Promise.all([
      fetchSheetRaw(SHEET_URLS.purchase, 'purchase'),
      fetchSheetRaw(SHEET_URLS.traffic, 'traffic')
    ]);
    const purchaseRows = parseCSV(purchaseRaw);
    const trafficRows = parseCSV(trafficRaw);
    const newPurchase = buildPurchaseRows(purchaseRows);
    const newTraffic = buildTrafficRows(trafficRows);
    if(newPurchase.length === 0 && newTraffic.length === 0){
      const preview = '[구매 CSV 앞부분] ' + purchaseRaw.slice(0,200).replace(/\n/g,' / ') +
                       '  ||  [유입 CSV 앞부분] ' + trafficRaw.slice(0,200).replace(/\n/g,' / ');
      throw new Error('시트에서 유효한 데이터를 찾지 못함. 미리보기: ' + preview);
    }
    purchase = newPurchase;
    traffic = newTraffic;
    chDev = buildChannelDevice(traffic, purchase);
    computeDerived();
    safeRender('p1', renderPanel1);
    safeRender('p2', renderPanel2);
    safeRender('p3', renderPanel3);
    safeRender('p4', renderPanel4);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    setStatus('ok', '실시간 연동 · ' + timeStr + ' 기준');
  } catch(err){
    // Live refresh failed — quietly keep showing the last known good data
    // (baked-in snapshot or the last successful fetch) instead of an error
    // banner. Log details to console for debugging without alarming the viewer.
    console.warn('시트 실시간 갱신 실패, 마지막 데이터 유지:', err.message);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    setStatus('stale', timeStr + ' 기준 데이터 표시 중 (실시간 갱신 대기)');
  }
}

        scales:{ y:{ grid:{color:COLORS.rule}, beginAtZero:true, title:{display:true, text:'세션', font:{size:11}} }, x:{ grid:{display:false} } }
      }
    });

    new Chart(document.getElementById('chartDailyPurchases'), {
      type: 'bar',
      data: {
        labels: dailyStats.map(d=>d.label),
        datasets: [
          { label:'구매 건수', backgroundColor: COLORS.mo, borderRadius:4, data: dailyStats.map(d=>d.txn) }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{ callbacks:{ afterLabel:(c)=> '수익: ' + fmtWon(dailyStats[c.dataIndex].revenue) } }
        },
        scales:{ y:{ grid:{color:COLORS.rule}, beginAtZero:true, title:{display:true, text:'구매 건수', font:{size:11}} }, x:{ grid:{display:false} } }
      }
    });
  }
}

// ===================================================================
// PANEL 2 — 채널별 성과 (유입 + 구매 + 전환율을 한 화면에 통합)
// ===================================================================
let chSortKey = 'sessions';
let chSortDir = -1;

function renderChannelTable(){
  const tbody = document.getElementById('chTableBody');
  if(!tbody) return;
  const rows = chDev.slice().sort((a,b)=> (a[chSortKey]-b[chSortKey]) * chSortDir);
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td>${r.channel}</td>
      <td><span class="badge ${r.device.toLowerCase()}">${r.device}</span></td>
      <td class="num">${fmtNum(r.sessions)}</td>
      <td class="num">${r.txn}</td>
      <td class="num">${fmtWon(r.revenue)}</td>
      <td class="num">${r.conv_rate.toFixed(2)}%</td>
      <td class="num">${fmtWon(r.rev_per_session)}</td>
    </tr>
  `).join('');
}

function renderPanel2(){
  const el = document.getElementById('p2');

  const qualified = chDev.filter(r=>r.sessions>=50).slice().sort((a,b)=>b.conv_rate-a.conv_rate).slice(0,10);
  const topBySessions = chDev.slice().sort((a,b)=>b.sessions-a.sessions).slice(0,10);

  el.innerHTML = `
    <section class="block">
      <div class="block-head"><h2 class="block-title">채널별 성과 <span class="hl yellow">한눈에 보기</span></h2></div>
      <p class="block-note">유입(세션)과 구매(거래·수익)를 채널·기기 단위로 합쳐서, 어디서 사람이 오고 어디서 실제로 팔리는지 한 표로 봅니다. 헤더 클릭하면 정렬됩니다.</p>
      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th data-key="channel">채널</th>
              <th data-key="device">기기</th>
              <th class="num" data-key="sessions">세션</th>
              <th class="num" data-key="txn">거래수</th>
              <th class="num" data-key="revenue">수익</th>
              <th class="num" data-key="conv_rate">전환율</th>
              <th class="num" data-key="rev_per_session">세션당 수익</th>
            </tr>
          </thead>
          <tbody id="chTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="block">
      <div class="block-head"><h2 class="block-title">세션이 <span class="hl blue">가장 많은</span> 채널</h2></div>
      <div class="chart-box">
        <div class="chart-canvas-wrap tall"><canvas id="chartTopSessions"></canvas></div>
      </div>
    </section>

    <section class="block">
      <div class="block-head"><h2 class="block-title">전환율이 <span class="hl mint">가장 높은</span> 채널 (세션 50+ 기준)</h2></div>
      <div class="chart-box">
        <div class="chart-canvas-wrap tall"><canvas id="chartConvRate"></canvas></div>
      </div>
      <div class="callout mint">
        <strong>주니어랩(B2B) PC가 전환율 4.29%로 압도적 1위</strong> — 세션은 적지만(70건) 방문한 사람은 거의 다 구매로 이어짐. NE북스 MO(1.23%), Google 자연검색 PC(0.69%)도 효율이 좋은 채널.
      </div>
    </section>
  `;

  document.querySelectorAll('#p2 th[data-key]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.getAttribute('data-key');
      if(chSortKey === key){ chSortDir *= -1; } else { chSortKey = key; chSortDir = -1; }
      renderChannelTable();
    });
  });
  renderChannelTable();

  new Chart(document.getElementById('chartTopSessions'), {
    type: 'bar',
    data: {
      labels: topBySessions.map(r=>`${r.channel} (${r.device})`),
      datasets: [{ data: topBySessions.map(r=>r.sessions), backgroundColor: topBySessions.map(r=>r.device==='PC'?COLORS.pc:COLORS.mo), borderRadius:4 }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{ x:{grid:{color:COLORS.rule}}, y:{grid:{display:false}} }
    }
  });

  new Chart(document.getElementById('chartConvRate'), {
    type: 'bar',
    data: {
      labels: qualified.map(r=>`${r.channel} (${r.device})`),
      datasets: [{ data: qualified.map(r=>r.conv_rate), backgroundColor: qualified.map(r=>r.device==='PC'?COLORS.pc:COLORS.mo), borderRadius:4 }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:(c)=>c.parsed.x.toFixed(2)+'%'}}},
      scales:{ x:{grid:{color:COLORS.rule}, title:{display:true,text:'전환율(%)',font:{size:11}}}, y:{grid:{display:false}} }
    }
  });
}

// ===================================================================
// PANEL 3 — 실행 제안 (흩어진 인사이트를 할 일 목록으로 정리)
// ===================================================================
function renderPanel3(){
  const el = document.getElementById('p3');

  const directMoSessions = traffic.filter(t=>t.channel==='Direct'&&t.device==='MO').reduce((a,b)=>a+b.sessions,0);
  const directShare = moStat.sessions ? (directMoSessions / moStat.sessions * 100) : 0;
  const bsaMo = chDev.find(r=>r.channel==='Naver BSA' && r.device==='MO');
  const bsaPc = chDev.find(r=>r.channel==='Naver BSA' && r.device==='PC');
  const googleMo = chDev.find(r=>r.channel==='Google 자연검색' && r.device==='MO');
  const juniorPc = chDev.find(r=>r.channel==='주니어랩(B2B)' && r.device==='PC');

  el.innerHTML = `
    <section class="block">
      <div class="block-head"><h2 class="block-title">이번 주에 <span class="hl coral">확인해볼 것</span></h2></div>
      <p class="block-note">데이터에서 바로 보이는 이슈와 기회를 우선순위 순으로 정리했습니다.</p>

      <div class="action-card urgent">
        <div class="action-tag">긴급</div>
        <div class="action-title">MO 다이렉트 유입 ${directShare.toFixed(1)}% — 출처 추적이 안 되고 있음</div>
        <p class="action-desc">모바일 세션 ${fmtNum(moStat.sessions)}건 중 ${fmtNum(directMoSessions)}건이 '다이렉트'로 잡힙니다. 문자 링크, 앱 내 브라우저 접속 등이 이렇게 잡히는 경우가 많아 실제 어떤 채널이 효과 있는지 알기 어렵습니다.</p>
        <p class="action-todo">→ 문자·카카오·이메일 등 모든 마케팅 링크에 UTM 파라미터 부착</p>
      </div>

      <div class="action-card opportunity">
        <div class="action-tag">기회</div>
        <div class="action-title">네이버 BSA, 모바일 전환이 PC보다 6배 이상 높음</div>
        <p class="action-desc">BSA 전환율 — MO ${bsaMo?bsaMo.conv_rate.toFixed(2):'-'}% vs PC ${bsaPc?bsaPc.conv_rate.toFixed(2):'-'}%. 모바일에서 이미 잘 통하는 키워드가 있다는 뜻입니다.</p>
        <p class="action-todo">→ MO 전환 높은 키워드 위주로 예산 재배분, 구매 시간대 분석해서 노출 스케줄 조정</p>
      </div>

      <div class="action-card watch">
        <div class="action-tag">점검 필요</div>
        <div class="action-title">구글 자연검색 MO — 세션 ${googleMo?fmtNum(googleMo.sessions):'-'}건인데 구매 0건</div>
        <p class="action-desc">전체 세션 중 2위 규모(17.62%)의 채널인데 구매로 전혀 이어지지 않고 있습니다. 대부분 부가자료(eBook/오디오북) 다운로드 목적의 방문으로 추정됩니다.</p>
        <p class="action-todo">→ 방문 목적과 구매 유도 CTA가 맞는지 확인, 필요 시 다운로드 후 구매 유도 흐름 보강</p>
      </div>

      <div class="action-card opportunity">
        <div class="action-tag">참고</div>
        <div class="action-title">주니어랩(B2B)이 세션당 수익이 가장 높은 채널</div>
        <p class="action-desc">세션은 ${juniorPc?fmtNum(juniorPc.sessions):'-'}건뿐이지만 전환율 ${juniorPc?juniorPc.conv_rate.toFixed(2):'-'}%, 세션당 수익 ${juniorPc?fmtWon(juniorPc.rev_per_session):'-'}로 압도적입니다.</p>
        <p class="action-todo">→ B2B 채널에 대한 별도 예산/캠페인 검토 가치 있음</p>
      </div>
    </section>
  `;
}

// ===================================================================
// PANEL 4 — Raw 데이터 테이블
// ===================================================================
let rawMode = 'traffic';
let rawDeviceFilter = 'ALL';
let rawSearch = '';
let rawSortKey = null;
let rawSortDir = -1;

function renderPanel4(){
  const el = document.getElementById('p4');
  el.innerHTML = `
    <section class="block">
      <div class="block-head"><h2 class="block-title">Raw 데이터 <span class="hl yellow">탐색</span></h2></div>
      <p class="block-note">위 화면들의 원본 데이터입니다. 특정 거래나 세션을 직접 찾아볼 때만 참고하세요.</p>
      <div class="filter-bar">
        <div class="seg" id="modeSeg">
          <button data-mode="traffic" class="active">유입 raw (${traffic.length})</button>
          <button data-mode="purchase">구매 raw (${purchase.length})</button>
        </div>
        <div class="seg" id="deviceSeg">
          <button data-device="ALL" class="active">전체</button>
          <button data-device="PC">PC</button>
          <button data-device="MO">MO</button>
        </div>
        <input type="text" id="rawSearch" placeholder="소스/매체 검색…">
      </div>
      <div class="table-scroll"><table class="data-table" id="rawTable"></table></div>
      <div class="row-count" id="rawCount"></div>
    </section>
  `;

  document.querySelectorAll('#modeSeg button').forEach(b=>b.addEventListener('click', ()=>{
    rawMode = b.getAttribute('data-mode'); rawSortKey=null;
    document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderRawTable();
  }));
  document.querySelectorAll('#deviceSeg button').forEach(b=>b.addEventListener('click', ()=>{
    rawDeviceFilter = b.getAttribute('data-device');
    document.querySelectorAll('#deviceSeg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderRawTable();
  }));
  document.getElementById('rawSearch').addEventListener('input', (e)=>{
    rawSearch = e.target.value.toLowerCase();
    renderRawTable();
  });

  renderRawTable();
}

function renderRawTable(){
  const table = document.getElementById('rawTable');
  const countEl = document.getElementById('rawCount');

  let cols, data;
  if(rawMode === 'traffic'){
    cols = [
      {key:'device', label:'기기'}, {key:'source', label:'소스/매체'},
      {key:'sessions', label:'세션', num:true}, {key:'sessions_pct', label:'세션비중', num:true, fmt:v=>v.toFixed(2)+'%'},
      {key:'engage_rate', label:'참여율', num:true, fmt:v=>parseFloat(v||0).toFixed(2)+'%'}, {key:'avg_time', label:'평균참여시간'},
      {key:'event_count', label:'이벤트수', num:true}, {key:'revenue', label:'수익', num:true, fmt:fmtWon}
    ];
    data = traffic;
  } else {
    cols = [
      {key:'device', label:'기기'}, {key:'txn_id', label:'거래ID'}, {key:'source', label:'첫 유입 소스/매체'},
      {key:'revenue', label:'구매수익', num:true, fmt:fmtWon}, {key:'revenue_pct', label:'수익비중', num:true, fmt:v=>v.toFixed(2)+'%'}
    ];
    data = purchase;
  }

  let filtered = data.filter(d => (rawDeviceFilter==='ALL' || d.device===rawDeviceFilter) && (rawSearch==='' || d.source.toLowerCase().includes(rawSearch)));

  if(rawSortKey){
    filtered = filtered.slice().sort((a,b)=>{
      const av=a[rawSortKey], bv=b[rawSortKey];
      if(typeof av === 'number') return (av-bv)*rawSortDir;
      return String(av).localeCompare(String(bv)) * rawSortDir;
    });
  }

  const thead = `<thead><tr>${cols.map(c=>`<th class="${c.num?'num':''}" data-key="${c.key}">${c.label}${rawSortKey===c.key?(rawSortDir===1?' ▴':' ▾'):''}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${filtered.map(row=>`<tr>${cols.map(c=>{
    let v = row[c.key];
    if(c.key==='device'){ return `<td><span class="badge ${v.toLowerCase()}">${v}</span></td>`; }
    if(c.fmt) v = c.fmt(v);
    else if(typeof v === 'number') v = fmtNum(v);
    return `<td class="${c.num?'num':''}">${v}</td>`;
  }).join('')}</tr>`).join('')}</tbody>`;

  table.innerHTML = thead + tbody;
  countEl.textContent = `${filtered.length}개 행 표시 중 (전체 ${data.length}개)`;

  table.querySelectorAll('th[data-key]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.getAttribute('data-key');
      if(rawSortKey === key){ rawSortDir *= -1; } else { rawSortKey = key; rawSortDir = -1; }
      renderRawTable();
    });
  });
}

// ===================================================================
// Tab navigation — wire this up FIRST so tab switching always works
// even if a chart render below throws.
// ===================================================================
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.getAttribute('data-panel')).classList.add('active');
  });
});

// ===================================================================
// Init — each panel wrapped in try/catch so one failure doesn't blank
// out the rest of the dashboard.
// ===================================================================
function safeRender(name, fn){
  try { fn(); }
  catch(e){
    console.error('Render failed:', name, e);
    const el = document.getElementById(name);
    if (el) el.innerHTML = '<p style="color:#E5484D; font-family:monospace; font-size:13px; padding:20px;">이 탭을 불러오는 중 오류가 발생했습니다: ' + (e && e.message ? e.message : e) + '</p>';
  }
}

// Render the reliable baked-in snapshot immediately so the dashboard is
// never blank/erroring, then quietly try to refresh from the live sheet.
computeDerived();
safeRender('p1', renderPanel1);
safeRender('p2', renderPanel2);
safeRender('p3', renderPanel3);
safeRender('p4', renderPanel4);
setStatus('stale', '고정 데이터 표시 중 (실시간 동기화 시도 중…)');

// Kick off live data load, then poll on an interval.
loadAllData(false);
setInterval(() => loadAllData(false), AUTO_REFRESH_MS);

// Manual refresh button
document.addEventListener('click', (e)=>{
  if(e.target && e.target.id === 'refreshBtn'){
    loadAllData(true);
  }
});

</script>
